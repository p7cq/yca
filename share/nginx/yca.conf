# nginx reverse proxy for the yca repository host + OCSP responder + ACME.
#
# Issued certificates point at (repository_host URLs), plus the ACME endpoint:
#   :80  /ocsp             -> yca-ocsp on 127.0.0.1:23509 (RFC 6960)
#   :80  /<slug>.crt|.crl  -> published CA certificates and CRLs (AIA/CDP)
#   :80  /.well-known/acme-challenge/ -> http-01 webroot
#   :443 /acme/            -> yca-acme on 127.0.0.1:8555 (RFC 8555)
#
# Plain HTTP on port 80 for OCSP/CRL: avoid TLS recursion into revocation
# checking. ACME is HTTPS (RFC 8555 requires it), terminated here with a
# certificate issued by this CA.
#
# Published AIA/CDP artifacts served from a copy under /srv/yca, refreshed
# hourly by yca-publish.timer.

upstream yca_ocsp {
    server 127.0.0.1:23509;
    keepalive 8;
}

upstream yca_acme {
    server 127.0.0.1:8555;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name pki.example.ca;  # repository_host from yca.toml

    # An OCSP request is ~100 bytes; the responder caps bodies at 4 KiB.
    client_max_body_size 4k;

    # RFC 6960 appendix A: POST /ocsp with a DER body, or GET
    # /ocsp/<url-escaped base64>. proxy_pass with no URI part: nginx
    # forwards the raw request URI untouched with the escaped
    # base64 ('/', '+', '=') part is passed through the proxy.
    location ^~ /ocsp {
        proxy_pass http://yca_ocsp;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # http-01 tokens for hosts fronted by this nginx - including the ACME
    # endpoint's own certificate renewal via a webroot client.
    location ^~ /.well-known/acme-challenge/ {
        root /srv/yca/webroot;
    }

    # AIA caIssuers -> /<slug>.crt (DER), CDP -> /<slug>.crl. Flat names;
    # slugs are lowercase kebab-case by config validation, so these
    # regexes cannot collide with /ocsp/<base64>.
    location ~ ^/[a-z0-9.-]+\.crt$ {
        root /srv/yca;
        types { }
        default_type application/pkix-cert;
        add_header Cache-Control "public, max-age=86400";
    }
    location ~ ^/[a-z0-9.-]+\.crl$ {
        root /srv/yca;
        types { }
        default_type application/pkix-crl;
        # A revoke rewrites the CRL: keep caches short.
        add_header Cache-Control "public, max-age=300";
    }

    # /healthz stays host-local (curl 127.0.0.1:23509/healthz);
    # anything else is closed.
    location / {
        return 404;
    }
}

# ACME endpoint (RFC 8555 requires HTTPS). The daemon listens plain HTTP
# on loopback; its --url must be EXACTLY https://<repository_host> - every
# JWS binds the request URL, and a mismatch fails all requests with 401.
# The certificate is issued by this CA: `yca create server` with the
# repository host as a SAN.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name pki.example.ca;  # = repository_host from yca.toml

    # Full chain (EE + signing CA) and key, published for nginx by the
    # operator - store artifacts are 0400 under the yca user.
    ssl_certificate     /etc/nginx/pki/pki.example.ca.chain.pem;
    ssl_certificate_key /etc/nginx/pki/pki.example.ca.key;

    # JWS bodies including a CSR stay small.
    client_max_body_size 64k;

    # No URI part on proxy_pass: the path reaches the daemon verbatim,
    # matching the JWS url binding.
    location ^~ /acme/ {
        proxy_pass http://yca_acme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        return 404;
    }
}
